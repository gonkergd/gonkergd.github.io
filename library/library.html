<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Library</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
    <form>
        <fieldset>
            <legend>Add a new book</legend>
            <label for="title">Title</label><span class="error">*</span>
            <input id="title" type="text" name="title" required />
            <span class="error error-gone" id="error-t">Enter a title!</span>
            <label for="author">Author</label><span class="error">*</span>
            <input id="author" type="text" name="author" required />
            <span class="error error-gone" id="error-a">Who made this book?</span>
            <label for="pages">Pages</label><span class="error">*</span>
            <input id="pages" type="number" name="pages" required />
            <span class="error error-gone" id="error-p">How many pages?</span>
            <label for="read">Read?</label>
            <input id="read" type="checkbox" name="read" />
            <button>New Book</button>
        </fieldset>
    </form>
</body>
<script src="script.js"></script>
</html>
