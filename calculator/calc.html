<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="display">
        <div class="numbers">0000000 : 0000000</div>
    </div>
    <div class="keys">
        <div class="pads numeric">
            <div class="set first3">
                <button class="one">1</button>
                <button class="two">√2</button>
                <button class="three">3</button>
            </div>
            <div class="set second3">
                <button class="four">π</button>
                <button class="five">5</button>
                <button class="six">6</button>
            </div>
            <div class="set third3">
                <button class="seven">7</button>
                <button class="eight">0</button>
                <button class="nine">e</button>
            </div>
        </div>
        <div class="pads operations">
            <button class="=">=</button>
            <button class="/">/0</button>
            <button class="x">x</button>
            <button class="-">-</button>
            <button class="+">+</button>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
