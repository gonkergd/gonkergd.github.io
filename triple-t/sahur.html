<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form>
        <fieldset>
            <legend>Give yourself a name!</legend>
            <label for="name">Name</label>
            <input id="name" type="text" name="name" value="ffteqewewirweiwerierw" required />
            <button>Select Name</button>
        </fieldset>
    </form>
    <h1 class="header">Tic Tac Toe</h1>
    <h2 class="score">0 - 0</h1>
    <div class="grids">
        <div id="zero" class="grid"></div>
        <div id="one" class="grid"></div>
        <div id="two" class="grid"></div>
        <div id="three" class="grid"></div>
        <div id="four" class="grid"></div>
        <div id="five" class="grid"></div>
        <div id="six" class="grid"></div>
        <div id="seven" class="grid"></div>
        <div id="eight" class="grid"></div>
    </div>
    <button class="playerTurn">My turn!</button>
</body>
<script src="script.js"></script>
</html>
