<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function getComputerChoice() {
            let choice = Math.random() * 3;
            if (choice < 1) return "rock";
            if (choice < 2) return "paper";
            return "scissors";
        }
        function getHumanChoice() {
            return prompt("pick.", "lose");
        }
        function playGame() {
            let humanScore = 0;
            let computerScore = 0;
            function playRound(humanChoice, computerChoice){
                if (humanChoice == "lose") {console.log("You lose!"); return "Player rage quit";}
                humanChoice = humanChoice.toLowerCase();
                if (humanChoice == computerChoice) console.log("Tie!")
                else if (humanChoice == "rock"){
                    if (computerChoice == "paper") {
                        computerScore++;
                        console.log("computer wins");
                        return;
                    }
                    humanScore++;
                    console.log("human wins");
                }
                else if (humanChoice == "paper"){
                    if (computerChoice == "scissors") {
                        computerScore++;
                        console.log("computer wins");
                        return;
                    }
                    humanScore++;
                    console.log("human wins");
                }
                else if (humanChoice == "scissors"){
                    if (computerChoice == "rock") {
                        computerScore++;
                        console.log("computer wins");
                        return;
                    }
                    humanScore++;
                    console.log("human wins");
                } 
                else {
                    return "Human is a dumbass";
                }
            }
            let qualified = true;
            for (let i = 0; i < 5; i++){
                let test = playRound(getHumanChoice(), getComputerChoice());
                if (test == "Player rage quit") {
                    qualified = false;
                    humanScore = computerScore;
                    break;
                }
                if (test == "Human is a dumbass"){
                    qualified = false;
                    humanScore = computerScore;
                    console.log("???????");
                    break;
                }
            }
            if (computerScore > humanScore) console.log("Game over, Computer wins!");
            else if (humanScore > computerScore) console.log("Game over, Human wins!");
            else if (qualified) console.log("Game over, Its a tie!");
        }
        playGame();
    </script>
</head>

</html>
