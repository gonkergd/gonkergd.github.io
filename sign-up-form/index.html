<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="left">
        <div class="logo">
            🤖 GD.AI
        </div>
        <div class="footer">
            Photo by <a href="https://gdbrowser.com/u/Iconixx">Iconixx</a> on <a href="https://gdbrowser.com/125801346">Hyper Ascent</a>
        </div>
    </div>
    <div class="right">
        <div class="context">Get a newsletter on the most AI generated levels <span class="emphasis">now!</span></div>
        <div class="form">
            <form>
                <fieldset>
                    <legend>Sign up now!</legend>
                    <div class="items">
                        <label for="first_name">FIRST NAME</label>
                        <input id="first_name" type="text" name="first_name" required/>
                        <label for="last_name">LAST NAME</label>
                        <input id="last_name" type="text" name="last_name" required/>
                    </div>
                    <div class="items">
                        <label for="email">EMAIL</label>
                        <input id="email" type="text" name="email" required />
                        <label for="phone">PHONE NUMBER</label>
                        <input id="phone" type="text" name="phone-number" required />
                    </div>
                    <div class="items">
                        <label for="pass">PASSWORD</label>
                        <input id="pass" type="password" name="password" required />
                        <label for="c-pass">CONFIRM PASSWORD</label>
                        <input id="c-pass" type="password" name="confirm-password" required />
                    </div>
                </fieldset>
            </form>
            <div class="create-account">
                <button>Create Account!</button>
                <div class="login">Already have an account? <a href="#">Log in</a></div>
            </div>
        </div>

    </div>
</body>
</html>
