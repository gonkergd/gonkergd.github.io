<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="left">
        <div class="logo">
            <p>🤖 GD.AI</p>
        </div>
        <div class="footer">
            Photo by <a href="https://gdbrowser.com/u/Iconixx">Iconixx</a> on <a href="https://gdbrowser.com/125801346">Hyper Ascent</a>
        </div>
    </div>

    <div class="right">
        <div class="context">Get a newsletter on the most AI generated levels <em> now!</em></div>
        <div class="form">
            <form>
                <fieldset>
                    <legend>Sign up now!</legend>
                    <div class="items">
                        <div class="item">
                            <label for="first_name">FIRST NAME</label>
                            <input id="first_name" type="text" name="first_name" required/>
                        </div>
                        <div class="item">
                            <label for="last_name">LAST NAME</label>
                            <input id="last_name" type="text" name="last_name" required/>
                        </div>
                    </div>
                    <div class="items">
                        <div class="item">
                            <label for="email">EMAIL</label>
                            <input id="email" type="email" name="email" required />
                        </div>
                        <div class="item">
                            <label for="phone">PHONE NUMBER</label>
                            <input id="phone" type="tel" name="phone-number" required />
                        </div>
                    </div>
                    <div class="items">
                        <div class="item">
                            <label for="pass">PASSWORD</label>
                            <input id="pass" type="password" name="password" required />
                        </div>
                        <div class="item">
                            <label for="c-pass">CONFIRM PASSWORD</label>
                            <input id="c-pass" type="password" name="confirm-password" required />
                        </div>
                    </div>
                </fieldset>
            </form>
        </div>
        <div class="create-account">
            <button onclick="window.location.href='https://www.youtube.com/shorts/ufaBhd3cssQ';">Create Account!</button>
            <div class="login">Already have an account? <a class="login" href="#" onclick="alert('Hello World!')">Log in</a></div>
        </div>
    </div>
</body>
</html>
